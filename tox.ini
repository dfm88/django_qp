[tox]
requires =
    tox>=4
    tox-uv>=1.0
env_list =
    # msgspec-only (core dep)
    py312-django42-msgspec-nodrf
    py313-django52-msgspec-nodrf
    # pydantic-only
    py310-django42-pydantic-nodrf
    py312-django42-pydantic-drf
    # Both backends
    py312-django50-both-drf
    py312-django51-both-nodrf
    py313-django51-both-drf
    py313-django52-both-drf
    py314-django52-both-nodrf
    py314-django52-both-drf

[testenv]
runner = uv-venv-runner
deps =
    pytest>=8.3.5
    pytest-asyncio>=0.23
    pytest-django>=4.10.0
    msgspec>=0.19.0
    django42: django>=4.2,<4.3
    django50: django>=5.0,<5.1
    django51: django>=5.1,<5.2
    django52: django>=5.2,<5.3
    pydantic: pydantic>=2.0
    both: pydantic>=2.0
    drf: djangorestframework>=3.15.2
commands =
    pytest {posargs:tests/}
set_env =
    DJANGO_SETTINGS_MODULE = tests.settings
