[tox]
requires =
    tox>=4
    tox-uv>=1.0
env_list =
    # Django 3.2 (EOL) — no DRF (DRF >=3.15.2 requires Django >=4.2)
    py310-django32-nodrf
    # Django 4.2 LTS
    py310-django42-nodrf
    py312-django42-drf
    # Django 5.0
    py312-django50-drf
    # Django 5.1
    py312-django51-nodrf
    py313-django51-drf
    # Django 5.2
    py313-django52-drf
    py314-django52-nodrf
    py314-django52-drf

[testenv]
runner = uv-venv-runner
deps =
    pytest>=8.3.5
    pytest-django>=4.10.0
    pydantic>=2.0
    django32: django>=3.2,<3.3
    django42: django>=4.2,<4.3
    django50: django>=5.0,<5.1
    django51: django>=5.1,<5.2
    django52: django>=5.2,<5.3
    drf: djangorestframework>=3.15.2
commands =
    pytest {posargs:tests/}
set_env =
    DJANGO_SETTINGS_MODULE = tests.settings
